# ==============================================================================
# HYPRIDLE CONFIGURATION
# ==============================================================================
# Idle daemon for Hyprland — handles lock-before-sleep and idle timeout.
# Docs: https://wiki.hyprland.org/Hypr-Ecosystem/hypridle/

general {
    # Runs when the system receives a lock signal (e.g. loginctl lock-session)
    lock_cmd = pidof hyprlock || hyprlock > /dev/null 2>&1

    # Lock the screen BEFORE the system goes to sleep (lid close, suspend)
    before_sleep_cmd = loginctl lock-session

    # Restore monitor backlight after waking up
    after_sleep_cmd = hyprctl dispatch dpms on
}

# --- IDLE TIMEOUT: Lock after 15 minutes ---
listener {
    timeout = 900                                   # 15 minutes (seconds)
    on-timeout = loginctl lock-session
}

# --- IDLE TIMEOUT: Screen off after 20 minutes ---
listener {
    timeout = 1200                                  # 20 minutes
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}
