# ==============================================================================
# MACOS PLATFORM OVERRIDES
# ==============================================================================
# Loaded automatically via platform.conf symlink (created by install.sh)

# Use Homebrew tmux (not in default PATH when Ghostty launches)
command = /opt/homebrew/bin/tmux new -A -s default

# Window appearance
window-padding-x = 4,2
window-padding-y = 6,0
background-opacity = 1
background-blur = true
maximize = true

# Shader animation
custom-shader-animation = true

# macOS keybinds
keybind = cmd+r=reload_config
keybind = cmd+ctrl+f=toggle_fullscreen
